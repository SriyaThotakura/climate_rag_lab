services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: climate-rag-app
    ports:
      - "8501:8501"
    environment:
      BACKEND: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      JUDGE_MODEL: ${JUDGE_MODEL:-qwen2.5:7b}
      EMBED_MODEL: ${EMBED_MODEL:-BAAI/bge-small-en-v1.5}
      CHUNK_SIZE: ${CHUNK_SIZE:-900}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      TOP_K: ${TOP_K:-4}
      COLLECTION_NAME: ${COLLECTION_NAME:-cbx_rag}
    volumes:
      - ./:/app
      - ../cbx_corpus:/cbx_corpus
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: climate-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
